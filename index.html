<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>电势转换工具 | Potential Converter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui, -apple-system, sans-serif;}
        body{max-width:900px;margin:2rem auto;padding:0 1rem;line-height:1.6;background:#f7f9fa;}
        .card{background:white;padding:1.8rem;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.06);margin-bottom:1.5rem;}
        h1{color:#1e293b;text-align:center;margin-bottom:0.5rem;}
        .subtitle{text-align:center;color:#64748b;margin-bottom:2rem;}
        .unit-switch{display:flex;justify-content:center;gap:0.5rem;margin-bottom:1.5rem;background:#e2e8f0;padding:0.3rem;border-radius:10px;width:fit-content;margin-left:auto;margin-right:auto;}
        .unit-btn{padding:0.5rem 1.2rem;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:0.95rem;color:#475569;transition:all 0.2s;}
        .unit-btn.active{background:#2563eb;color:white;box-shadow:0 2px 8px rgba(37,99,235,0.3);}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));gap:1.2rem;margin-bottom:1.5rem;}
        .form-group{display:flex;flex-direction:column;gap:0.5rem;}
        label{font-weight:500;color:#334155;font-size:0.95rem;}
        input,select{padding:0.9rem;border:1px solid #e2e8f0;border-radius:10px;font-size:1rem;transition:border 0.2s;}
        input:focus,select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1);}
        .btn-group{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
        .btn-primary{background:#2563eb;color:white;border:none;padding:1rem;border-radius:10px;font-size:1rem;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem;}
        .btn-primary:hover{background:#1d4ed8;}
        .btn-secondary{background:#0d9488;color:white;border:none;padding:1rem;border-radius:10px;font-size:1rem;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem;}
        .btn-secondary:hover{background:#0f766e;}
        .result-card{background:#eff6ff;border-radius:12px;padding:1.5rem;}
        .result-card h2{color:#1e40af;margin-bottom:1rem;font-size:1.1rem;}
        .result-table{width:100%;border-collapse:collapse;}
        .result-table th,.result-table td{padding:0.8rem;text-align:left;border-bottom:1px solid #dbeafe;}
        .result-table th{color:#475569;font-weight:500;}
        .result-table td{color:#1e293b;}
        .result-table .value{font-weight:600;color:#1e40af;}
        .formula-note{margin-top:1.5rem;padding:1rem;background:#f8fafc;border-radius:8px;color:#64748b;font-size:0.9rem;}
        .note{text-align:center;color:#94a3b8;font-size:0.85rem;margin-top:2rem;}
    </style>
</head>
<body>

<h1>电势（电位）转换工具</h1>
<p class="subtitle">不同参比电极、不同pH值的电势一键互转 | 25℃标准条件</p>

<div class="unit-switch">
    <button class="unit-btn active" onclick="switchUnit('V')" id="btnV">单位: V (伏特)</button>
    <button class="unit-btn" onclick="switchUnit('mV')" id="btnmV">单位: mV (毫伏)</button>
</div>

<div class="card">
    <div class="form-grid">
        <div class="form-group">
            <label>输入电位值</label>
            <input type="number" id="potential" step="0.001" value="0.0" placeholder="输入电位">
        </div>
        <div class="form-group">
            <label>原始参比电极</label>
            <select id="fromRef">
                <option value="SHE">SHE / NHE (标准氢电极)</option>
                <option value="SCE">SCE (饱和甘汞电极)</option>
                <option value="AgAgCl">Ag/AgCl (饱和 KCl)</option>
                <option value="HgHgO_01M">Hg/HgO (0.1 M NaOH)</option>
                <option value="HgHgO_1M" selected>Hg/HgO (1.0 M NaOH)</option>
                <option value="HgHgSO4">Hg/HgSO₄ (饱和 K₂SO₄)</option>
            </select>
        </div>
        <div class="form-group">
            <label>溶液 pH (仅 RHE 转换需要)</label>
            <input type="number" id="pH" step="0.1" value="14.0" placeholder="输入pH">
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-primary" onclick="calculate()">
            <i class="fas fa-calculator"></i> 开始转换
        </button>
        <button class="btn-secondary" onclick="exportData()">
            <i class="fas fa-download"></i> 导出数据
        </button>
    </div>

    <div class="result-card" id="resultCard" style="display:none;">
        <h2>转换结果 (同步显示所有参比电极电位)</h2>
        <table class="result-table" id="resultTable">
            <thead>
                <tr>
                    <th>参比电极</th>
                    <th>转换后电位</th>
                    <th>计算说明</th>
                </tr>
            </thead>
            <tbody id="resultBody">
            </tbody>
        </table>
    </div>

    <div class="formula-note">
        <strong>换算公式 (25℃):</strong><br>
        普通互转: E(目标) = E(原始) + E<sub>原始 vs SHE</sub> - E<sub>目标 vs SHE</sub><br>
        RHE 转换: E<sub>RHE</sub> = E<sub>参比</sub> + E<sub>参比 vs SHE</sub> + 0.0592 × pH
    </div>
</div>

<p class="note">本工具仅使用公开电化学标准常数，仅供科研参考</p>

<script>
// 修正后的标准电势常数 (vs SHE, 25℃)，对齐原网站数值
const refPotential = {
    SHE: 0,
    SCE: 0.241,
    AgAgCl: 0.197,
    HgHgO_01M: 0.165,
    HgHgO_1M: 0.107, // 修正了这里！和原网站对齐
    HgHgSO4: 0.640
};

const refNames = {
    SHE: "SHE / NHE (标准氢电极)",
    SCE: "SCE (饱和甘汞电极)",
    AgAgCl: "Ag/AgCl (饱和 KCl)",
    HgHgO_01M: "Hg/HgO (0.1 M NaOH)",
    HgHgO_1M: "Hg/HgO (1.0 M NaOH)",
    HgHgSO4: "Hg/HgSO₄ (饱和 K₂SO₄)",
    RHE: "RHE (可逆氢电极)"
};

let currentUnit = 'V';
const unitRatio = { 'V': 1, 'mV': 1000 };
const unitSuffix = { 'V': 'V', 'mV': 'mV' };

function switchUnit(unit) {
    currentUnit = unit;
    document.getElementById('btnV').classList.toggle('active', unit === 'V');
    document.getElementById('btnmV').classList.toggle('active', unit === 'mV');
    
    // 转换输入框的数值
    const input = document.getElementById('potential');
    if(input.value) {
        const val = parseFloat(input.value);
        if(unit === 'mV') {
            input.value = (val * 1000).toFixed(1);
            input.step = 0.1;
        } else {
            input.value = (val / 1000).toFixed(3);
            input.step = 0.001;
        }
    }
    
    // 如果已经有结果，重新计算刷新单位
    if(document.getElementById('resultCard').style.display !== 'none') {
        calculate();
    }
}

function calculate() {
    const E_input = parseFloat(document.getElementById('potential').value);
    const pH = parseFloat(document.getElementById('pH').value);
    const from = document.getElementById('fromRef').value;
    
    if (isNaN(E_input) || isNaN(pH)) {
        alert('请输入有效数字！');
        return;
    }

    // 转换为V进行计算
    const E_input_V = E_input / unitRatio[currentUnit];
    const E_from_vs_SHE = refPotential[from];
    const E_vs_SHE = E_input_V + E_from_vs_SHE;

    const resultBody = document.getElementById('resultBody');
    resultBody.innerHTML = '';

    // 遍历所有参比，生成结果
    for (const key in refPotential) {
        const E_to_vs_SHE = refPotential[key];
        const E_result_V = E_vs_SHE - E_to_vs_SHE;
        const E_result = E_result_V * unitRatio[currentUnit];
        
        const desc = `${E_input_V.toFixed(3)} + ${E_from_vs_SHE} - ${E_to_vs_SHE} (单位: ${currentUnit})`;
        
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${refNames[key]}</td>
            <td class="value">${E_result.toFixed(3)} ${unitSuffix[currentUnit]}</td>
            <td>${desc}</td>
        `;
        resultBody.appendChild(row);
    }

    // 单独加RHE
    const E_RHE_V = E_vs_SHE + 0.0592 * pH;
    const E_RHE = E_RHE_V * unitRatio[currentUnit];
    const descRHE = `${E_input_V.toFixed(3)} + ${E_from_vs_SHE} + 0.0592 × ${pH} (单位: ${currentUnit})`;
    
    const rowRHE = document.createElement('tr');
    rowRHE.innerHTML = `
        <td>${refNames.RHE}</td>
        <td class="value">${E_RHE.toFixed(3)} ${unitSuffix[currentUnit]}</td>
        <td>${descRHE}</td>
    `;
    resultBody.appendChild(rowRHE);

    document.getElementById('resultCard').style.display = 'block';
}

function exportData() {
    const rows = document.querySelectorAll('#resultBody tr');
    let csv = '参比电极,转换后电位,计算说明\n';
    rows.forEach(row => {
        const cols = row.querySelectorAll('td');
        csv += `${cols[0].textContent},${cols[1].textContent},${cols[2].textContent}\n`;
    });
    
    const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '电势转换结果.csv';
    a.click();
    URL.revokeObjectURL(url);
}
</script>
</body>
</html>
